name: TransitLens ML Core CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r transitlens-ml-core/requirements.txt
        pip install -r transitlens-data-pipeline/requirements.txt
        pip install -r transitlens-platform/requirements.txt
        pip install pytest

    - name: Run diagnostic checks
      run: |
        cd transitlens-ml-core
        python core/cli.py diagnose

    - name: Run unit and integration tests
      run: |
        python -m pytest transitlens-ml-core/
        python -m pytest transitlens-data-pipeline/

    - name: Run end-to-end smoke test
      run: |
        python transitlens-ml-core/eval/run_smoke_test.py

