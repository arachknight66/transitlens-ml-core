api:
  cors_origins:
  - '*'
  host: 0.0.0.0
  log_level: info
  port: 8000
bls:
  alias_check_tolerance: 0.2
  bls_power_threshold: 0.15
  duration_max_fraction: 0.5
  duration_min_days: 0.01
  n_durations: 5
  n_oversample: 10
  period_max_days: null
  period_min_days: 0.5
  snr_threshold: 5.0
classification:
  depth_snr_threshold: 5.0
  depth_threshold_eb: 0.05
  odd_even_threshold: 0.02
  v_shape_threshold: 0.4
features:
  noise_exclusion_factor: 1.5
  odd_even_min_transits: 4
  phase_bins: 100
fitting:
  fitting_level: quick
  random_seed: 42
ml_classifier:
  blend_weight: 0.0
  dev_fallback: false
  enabled: true
  model_type: rf
  use_rule_fallback_on_disagreement: true
plotting:
  downsample_points: 2000
  dpi: 100
  figure_height: 4
  figure_width: 10
  phase_bins: 100
  style: seaborn-v0_8-whitegrid
  transit_shade_alpha: 0.15
preprocessing:
  detrend_method: running_median
  detrend_poly_degree: 2
  detrend_window_days: 1.5
  gap_threshold_factor: 5.0
  max_sigma_iter: 3
  min_fraction_retained: 0.8
  min_points: 500
  min_time_span_days: 5.0
  sigma_lower: 50.0
  sigma_upper: 5.0
version: 0.1.0
