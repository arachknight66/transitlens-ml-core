# config.yaml
# -----------
# Global pipeline configuration for transitlens-ml-core.
#
# All parameters are documented. Override any top-level key by passing
# config={...} to analyze_light_curve(). Nested dicts are merged recursively.
#
# Pipeline version follows semver. Included in every result dict so the
# platform can log which version produced a given analysis.

version: "0.1.0"

# ── Preprocessing ────────────────────────────────────────────────────────────
preprocessing:
  # Upper sigma is tight: removes stellar flares and upward cosmic-ray spikes.
  sigma_upper: 5.0

  # Lower sigma is deliberately loose: transit dips (legitimate downward signals)
  # must not be clipped. A 1.3% transit at noise=0.001 is 13σ below the median.
  # Setting sigma_lower=50 ensures no real transit is removed at this stage.
  sigma_lower: 50.0

  max_sigma_iter: 3

  # Detrending method: "running_median" (default, robust) or "polynomial".
  detrend_method: "running_median"

  # Window size for running median detrending in days.
  # Must be much larger than the transit duration (~0.1 days) to avoid
  # absorbing the transit signal. 1.5 days is ~15x the typical duration.
  detrend_window_days: 1.5

  # Polynomial degree for polynomial detrending (fallback method).
  detrend_poly_degree: 2

  # A gap is flagged when consecutive timestamps differ by more than
  # gap_threshold_factor × median_cadence.
  gap_threshold_factor: 5.0

  # Minimum number of data points to run BLS (fewer → unreliable period search).
  min_points: 500

  # Minimum time span to run BLS (need ≥2 transit events to confirm a period).
  min_time_span_days: 5.0

  # Minimum fraction of points retained after sigma clipping.
  # If more than 20% are clipped, data is too noisy to analyse reliably.
  min_fraction_retained: 0.80

# ── BLS Transit Detection ────────────────────────────────────────────────────
bls:
  # Minimum physically plausible orbital period (close-in hot Jupiter limit).
  period_min_days: 0.5

  # Maximum period to search. null → time_span / 2 (need ≥2 transits).
  # Override with a specific value to restrict the search range.
  period_max_days: null

  # Oversampling factor for the frequency grid.
  # Higher = finer period resolution, slower computation.
  n_oversample: 10

  # Number of trial transit durations per period (log-spaced).
  n_durations: 5

  # Minimum transit duration to try (~15 minutes).
  duration_min_days: 0.01

  # Maximum transit duration as fraction of period.
  # A transit cannot physically last more than half an orbital period.
  duration_max_fraction: 0.5

  # Minimum normalised BLS power for a detection.
  # Below this → candidate_detected=False.
  bls_power_threshold: 0.15

  # Minimum signal-to-noise ratio (depth / local_noise) for a detection.
  # Below this → candidate_detected=False.
  snr_threshold: 5.0

  # Alias check tolerance: if a harmonic period has power within this fraction
  # of the peak, alias_warning=True is set in the result.
  alias_check_tolerance: 0.20

# ── Feature Extraction ───────────────────────────────────────────────────────
features:
  # Number of phase bins for phase-folded light curve analysis.
  phase_bins: 100

  # Minimum number of transit events required to compute odd/even depth delta.
  odd_even_min_transits: 4

  # Exclusion buffer around transit centre when estimating out-of-transit noise.
  # Points within noise_exclusion_factor × half_duration of transit are excluded.
  noise_exclusion_factor: 1.5

# ── Classification ───────────────────────────────────────────────────────────
# Note: primary thresholds live in models/rule_config.yaml.
# This section passes through to rule_config at runtime.
classification:
  depth_threshold_eb: 0.050
  odd_even_threshold: 0.020
  v_shape_threshold: 0.40
  depth_snr_threshold: 5.0

# ── Optional ML Classifier ───────────────────────────────────────────────────
ml_classifier:
  enabled: true
  model_type: "rf"
  dev_fallback: false
  blend_weight: 0.0
  use_rule_fallback_on_disagreement: true

# ── Plotting ─────────────────────────────────────────────────────────────────
plotting:
  # Output resolution for PNG plots (dots per inch).
  dpi: 100

  # Figure dimensions in inches.
  figure_width: 10
  figure_height: 4

  # Downsample raw light curve to this many points for plotting speed.
  # 18000 points plotted individually is slow; 2000 is invisible to the eye.
  downsample_points: 2000

  # Number of phase bins for the phase-folded plot.
  phase_bins: 100

  # Alpha (transparency) for transit window shading on cleaned LC plot.
  transit_shade_alpha: 0.15

  # Matplotlib style sheet.
  style: "seaborn-v0_8-whitegrid"

# ── Fitting ──────────────────────────────────────────────────────────────────
fitting:
  fitting_level: "quick"  # "quick" | "standard" | "rigorous"
  random_seed: 42

# ── API ──────────────────────────────────────────────────────────────────────
api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "*"
  log_level: "info"