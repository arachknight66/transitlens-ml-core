# phase2_diagnostics.yaml
# ----------------------
# Centralized configuration parameters and thresholds for TransitLens Phase 2.

General:
  diagnostics_version: "2.0.0"
  random_seed: 42
  numerical_precision: "float64"
  minimum_valid_cadences: 50
  minimum_in_transit_points: 5
  minimum_out_of_transit_points: 20
  minimum_observed_events: 3
  phase_bin_count: 100
  robust_estimator_choice: "median"
  bootstrap_iterations: 100
  permutation_iterations: 100
  confidence_interval_level: 0.95

# Frozen inference-time detector settings. These are the public pipeline's
# pre-existing detection policy, not thresholds selected from Phase 2 labels.
BLS:
  period_min_days: 0.5
  period_max_days: null
  n_oversample: 10
  n_durations: 5
  duration_min_days: 0.01
  duration_max_fraction: 0.5
  bls_power_threshold: 0.15
  snr_threshold: 5.0
  min_depth_snr: 0.5
  alias_check_tolerance: 0.20
  alias_promote_threshold: 0.90

OddEven:
  minimum_odd_events: 2
  minimum_even_events: 2
  transit_window_multiplier: 1.2
  baseline_window_multiplier: 3.0
  maximum_permitted_masked_fraction: 0.3
  depth_estimator: "median"
  uncertainty_estimator: "mad"
  significance_threshold_sigma: 3.0
  absolute_fractional_difference_threshold: 0.05
  alias_retest_policy: "strongest_consistent"

SecondaryEclipse:
  fixed_phase_05_search_enablement: true
  full_phase_search_enablement: true
  excluded_primary_transit_window_multiplier: 1.5
  allowed_secondary_duration_range_days: [0.01, 0.5]
  minimum_secondary_points: 5
  number_of_phase_trials: 50
  local_baseline_window_multiplier: 3.0
  multiple_testing_correction: "bonferroni"
  minimum_depth_significance_sigma: 3.0
  maximum_planetary_consistent_secondary_depth_ratio: 0.10
  bootstrap_permutation_policy: "hybrid"

Morphology:
  trapezoid_fitting_bounds:
    depth: [1e-6, 0.99]
    duration_days: [0.005, 1.0]
    ingress_fraction: [0.0, 0.5]
  ingress_fraction_thresholds:
    grazing_limit: 0.45
  v_shape_definition: "ingress_plus_egress_fraction"
  grazing_event_warning_thresholds:
    v_shape_limit: 0.80
  minimum_fit_quality_r2: 0.20
  binning_policy: "equal_width"
  bootstrap_iterations: 100

HarmonicVariability:
  harmonic_orders: [1, 2]
  frequencies_to_evaluate: "orbital"
  detrending_policy: "mask_and_poly"
  robust_regression_method: "huber"
  amplitude_significance_thresholds: 3.0
  ellipsoidal_threshold: 0.0001
  reflection_threshold: 0.0001
  beaming_threshold: 0.00005

Centroid:
  centroid_columns: ["MOM_CENTR1", "MOM_CENTR2"]
  quality_bit_policy: "strict_zero"
  in_transit_window_multiplier: 1.0
  out_of_transit_comparison_window_multiplier: 1.5
  robust_location_estimator: "median"
  covariance_regularization: 1e-6
  minimum_in_out_centroid_points: 5
  bootstrap_iterations: 100
  permutation_iterations: 100
  pixel_scale_arcsec_per_pixel: 21.0
  pixel_scale_version: "TESS_NOMINAL_1.0"
  shift_significance_threshold_sigma: 3.0
  absolute_shift_threshold_arcsec: 2.0
  quality_thresholds:
    max_scatter_pixels: 0.5

DifferenceImaging:
  number_of_in_transit_cadences: 10
  number_of_out_of_transit_cadences: 30
  background_strategy: "local_median"
  cosmic_ray_rejection: "median_stack"
  image_stacking_method: "robust_mean"
  minimum_difference_image_snr: 4.0
  centroiding_method: "flux_weighted"
  prf_fit_enablement: false
  localization_uncertainty_method: "bootstrap"
  acceptable_target_offset_pixels: 1.0
  source_edge_warning_limit_pixels: 0.5
  saturation_handling: "mask_saturated"
  wcs_usage: "prefer_wcs"

Gaia:
  catalogue_release: "DR3"
  cone_search_radius_arcsec: 105.0 # 5 TESS pixels
  cache_directory: "data/cache/gaia"
  timeout_seconds: 30
  retry_policy:
    max_retries: 3
    backoff_factor: 2.0
  rate_limit_calls_per_min: 30
  proper_motion_propagation: true
  target_match_tolerance_arcsec: 5.0
  maximum_neighbor_magnitude_difference: 10.0
  tess_magnitude_conversion_version: "stassun_2019"
  missing_colour_handling: "average_relation"
  contamination_aperture_radius_arcsec: 42.0 # ~2 pixels
  query_provenance_fields: ["source_id", "ra", "dec", "pmra", "pmdec", "phot_g_mean_mag", "phot_bp_mean_mag", "phot_rp_mean_mag"]
  offline_only: true

CrowdingDilution:
  crowdsap_valid_range: [0.01, 1.0]
  flfrcsap_valid_range: [0.01, 1.0]
  correction_formulas: "depth_divided_by_crowdsap"
  uncertainty_assumptions:
    crowdsap_sigma: 0.02
  minimum_correction_quality: 0.50
  extreme_correction_warning_threshold: 0.30
  cross_sector_consistency_tolerance: 0.15

MultiAperture:
  aperture_definitions: ["small", "nominal", "expanded"]
  thresholding_strategy: "chi2_inconsistency"
  minimum_aperture_pixels: 2
  maximum_aperture_pixels: 25
  background_annulus: [30.0, 50.0]
  aperture_nesting_rule: "strict_inclusion"
  depth_estimator: "trapezoid_fit"
  aperture_depth_uncertainty: "bootstrap"
  consistency_significance_p_value: 0.05
  source_offset_interpretation: "radial_trend"

EvidenceAggregation:
  eb_evidence_weights:
    odd_even_asymmetry: 3.0
    secondary_eclipse: 3.0
    v_shape: 2.0
    excessive_depth: 1.5
    harmonic_ellipsoidal: 2.0
  blend_evidence_weights:
    centroid_shift: 3.0
    difference_offset: 3.0
    gaia_neighbor: 2.0
    aperture_trend: 2.0
    crowding_dilution: 1.5
    ephemeris_match: 3.0
  minimum_independent_evidence_families: 2
  hard_review_conditions:
    unresolved_centroid_shift: true
    gaia_contaminant_no_offset: true
    ambiguous_alias: true
  missingness_penalties:
    low_data_quality: 0.1
  contradictory_evidence_routing: "review_required"
  risk_score_thresholds:
    low: 0.30
    medium: 0.70
  threshold_policy_version: "2.0.0"

Evaluation:
  benchmark_paths:
    train: "data/manifests/phase1/train_targets.parquet"
    val: "data/manifests/phase1/validation_targets.parquet"
    test: "data/manifests/phase1/test_targets.parquet"
  split_source: "split_manifest.parquet"
  minimum_class_supports:
    planets: 200
    ebs: 200
    blends: 100
    controls: 500
  precision_recall_gates:
    eb_recall: 0.90
    blend_recall: 0.80
    blend_precision: 0.75
    clean_planet_false_flag: 0.10
  availability_gates:
    spatial_diagnostics_tpf_ratio: 0.90
  bootstrap_confidence_intervals:
    n_resamples: 1000
    alpha: 0.05
